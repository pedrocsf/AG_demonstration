<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização Gource - Algoritmo Genético</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <h2>Algoritmo Genético</h2>
        <div class="control-group">
            <label for="popSize">População Inicial:</label>
            <input type="number" id="popSize" value="150" min="10" max="1000">
        </div>
        <div class="control-group">
            <label for="maxGen">Máx. Gerações:</label>
            <input type="number" id="maxGen" value="200" min="10" max="1000">
        </div>
        <div class="control-group">
            <label for="patience">Patience (Convergência):</label>
            <input type="number" id="patience" value="15" min="1" max="100">
        </div>
        <button id="startBtn">Iniciar Evolução</button>
    </div>

    <div id="timeline-container" class="hidden">
        <div class="timeline-info">
            <span id="genLabel">Geração: 0</span>
            <span id="fitnessLabel">Melhor Fitness: 0.00</span>
        </div>
        <input type="range" id="timeline" min="0" max="0" value="0" step="0.01">
    </div>

    <canvas id="canvas"></canvas>
    <script src="app.js"></script>
</body>
</html>
